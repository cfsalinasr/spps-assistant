appId: org.sppsassistant.desktop
productName: SPPS Assistant
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
# The frozen Python sidecar (packaging/build_sidecar.sh output, staged at
# desktop/resources/sidecar/ before this runs) is copied into the app's
# Resources folder verbatim — asarUnpack alone isn't enough since the
# sidecar's own files (a real executable + its bundled Python libs) must
# never be packed into app.asar at all, only unpacked.
extraResources:
  - from: resources/sidecar
    to: sidecar
asarUnpack:
  - resources/**
win:
  executableName: SPPS Assistant
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  # No notarization/code signing in v1 — deferred, not rejected (see
  # SPPS_GUI_MIGRATION_PLAN.md §2). Users install an unsigned .dmg and
  # click through Gatekeeper once; the install guide documents this.
  notarize: false
dmg:
  artifactName: ${productName}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
