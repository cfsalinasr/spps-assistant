sonar.projectKey=cfsalinasr_spps-assistant
sonar.organization=cfsalinasr

sonar.projectName=SPPS Synthesis Assistant
sonar.projectVersion=1.0.0

sonar.sources=spps_assistant,desktop/src
sonar.tests=tests,desktop/src
sonar.test.inclusions=desktop/src/**/*.test.ts,desktop/src/**/*.test.tsx

sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.11
sonar.javascript.lcov.reportPaths=desktop/coverage/lcov.info

sonar.sourceEncoding=UTF-8

# Exclude generated/infra files from duplication checks
sonar.cpd.exclusions=spps_assistant/infrastructure/pdf_generator.py,spps_assistant/infrastructure/docx_generator.py

# Exclude egg-info and cache
sonar.exclusions=**/*.egg-info/**,**/__pycache__/**,**/.*/**,desktop/node_modules/**,desktop/dist/**,desktop/out/**,desktop/resources/**
